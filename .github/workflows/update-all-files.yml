name: Update ALL_FILES.md

on:
  push:
    branches:
      - main

jobs:
  update-all-files:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Get File List
      run: |
        echo "# File List" > ALL_FILES.md
        find . -type f >> ALL_FILES.md

    - name: Commit changes
      run: |
        git config --local user.email "actions@github.com"
        git config --local user.name "GitHub Actions"
        git add ALL_FILES.md
        git commit -m "Update ALL_FILES.md" || echo "No changes to commit"

    - name: Push changes
      run: |
        git push origin main